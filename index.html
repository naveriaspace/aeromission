<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AeroMission — Aerospace Mission Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<!-- Google API readiness flags — must be defined BEFORE the async scripts load -->
<script>
window._gapiLoaded = false;
window._gisLoaded = false;
function onGapiLoad() { window._gapiLoaded = true; window.dispatchEvent(new Event('gapi-ready')); }
function onGisLoad() { window._gisLoaded = true; window.dispatchEvent(new Event('gis-ready')); }
</script>

<!-- Google APIs -->
<script async defer src="https://apis.google.com/js/api.js" onload="onGapiLoad()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="onGisLoad()"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ── Reset & base ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f1f5f9;
  color: #1e293b;
  font-size: 13px;
  line-height: 1.5;
}
:root {
  --accent: #0ea5e9;
  --accent-dark: #0284c7;
  --critical: #ef4444;
  --border: #e2e8f0;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --text: #1e293b;
  --text-muted: #64748b;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.1);
  --radius: 8px;
  --sidebar-w: 220px;
}

/* ── Layout ────────────────────────────────────────────────────────────────── */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--surface-2);
}
.app-topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
  z-index: 100;
}
.app-logo {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 14px; font-weight: 700;
  color: var(--text); letter-spacing: -0.5px;
}
.app-logo-mark {
  width: 28px; height: 28px; border-radius: 6px;
  background: linear-gradient(135deg, #0ea5e9, #6366f1);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: white;
}
.app-logo-sub {
  font-size: 9px; color: var(--text-muted); font-weight: 400;
  display: block; letter-spacing: 1px; text-transform: uppercase;
  margin-top: -2px;
}
.topbar-nav {
  display: flex; gap: 4px; margin-left: 16px;
}
.nav-btn {
  padding: 5px 12px; border-radius: 6px; border: none;
  background: transparent; color: var(--text-muted);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.nav-btn:hover { background: #f1f5f9; color: var(--text); }
.nav-btn.active { background: #e0f2fe; color: var(--accent); font-weight: 600; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.sync-status {
  font-size: 11px; color: var(--text-muted);
  font-family: 'Space Mono', monospace;
  display: flex; align-items: center; gap: 5px;
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22c55e;
}
.sync-dot.offline { background: #ef4444; }
.sync-dot.syncing {
  background: #f59e0b;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Buttons ───────────────────────────────────────────────────────────────── */
.btn-primary {
  padding: 7px 14px; border-radius: 6px; border: none;
  background: var(--accent); color: white;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background .15s;
}
.btn-primary:hover { background: var(--accent-dark); }
.btn-primary.small { padding: 4px 10px; font-size: 11px; }
.btn-primary.loading { opacity: 0.7; cursor: wait; }
.btn-secondary {
  padding: 7px 14px; border-radius: 6px;
  border: 1px solid var(--border); background: white;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all .15s;
}
.btn-secondary:hover { background: var(--surface-2); }
.btn-google {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; border-radius: 8px;
  border: 1.5px solid var(--border); background: white;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .2s; color: var(--text);
}
.btn-google:disabled { opacity: 0.6; cursor: not-allowed; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 14px; padding: 2px 6px;
  border-radius: 4px; transition: all .15s; line-height: 1;
}
.icon-btn:hover { background: #f1f5f9; color: var(--text); }
.tab-btn {
  padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border);
  background: white; font-size: 11px; cursor: pointer;
  color: var(--text-muted); transition: all .15s;
}
.tab-btn.active, .tab-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

/* ── Main body ─────────────────────────────────────────────────────────────── */
.app-body {
  display: flex; flex: 1; overflow: hidden;
}

/* ── Mission sidebar ───────────────────────────────────────────────────────── */
.mission-sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: width .2s, min-width .2s;
  overflow: hidden;
}
.mission-sidebar.collapsed { width: 40px; min-width: 40px; }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 10px 8px;
  border-bottom: 1px solid var(--border);
}
.sidebar-title {
  font-family: 'Space Mono', monospace;
  font-size: 10px; font-weight: 700;
  color: var(--text-muted); letter-spacing: 1.5px;
}
.mission-list { flex: 1; overflow-y: auto; padding: 6px 0; }
.mission-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .15s;
}
.mission-item:hover { background: #f8fafc; }
.mission-item.active { background: #e0f2fe; border-left-color: var(--accent); }
.mission-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.mission-item-text {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 1px;
}
.mission-name {
  font-size: 12px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mission-status { font-size: 10px; font-weight: 600; }
.delete-btn { opacity: 0; }
.mission-item:hover .delete-btn { opacity: 1; }
.add-mission-btn {
  margin: 8px 10px; padding: 8px;
  border: 1.5px dashed var(--border); border-radius: 6px;
  background: transparent; color: var(--text-muted);
  font-size: 11px; cursor: pointer;
  transition: all .15s; text-align: center;
}
.add-mission-btn:hover { border-color: var(--accent); color: var(--accent); background: #e0f2fe; }

/* ── Content area ──────────────────────────────────────────────────────────── */
.content-area {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
}
.content-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mission-title-bar {
  display: flex; align-items: center; gap: 10px;
}
.mission-title-badge {
  width: 10px; height: 10px; border-radius: 50%;
}
.content-title {
  font-size: 14px; font-weight: 600; color: var(--text);
}
.content-subtitle {
  font-size: 11px; color: var(--text-muted);
  font-family: 'Space Mono', monospace;
}
.toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.toggle-wrap {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-muted);
}
.toggle {
  position: relative; width: 30px; height: 16px;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0; border-radius: 16px;
  background: #cbd5e1; cursor: pointer; transition: background .2s;
}
.toggle-slider::before {
  content: ''; position: absolute;
  width: 12px; height: 12px; border-radius: 50%;
  background: white; top: 2px; left: 2px;
  transition: transform .2s; box-shadow: 0 1px 2px rgba(0,0,0,.2);
}
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(14px); }

/* ── Gantt ─────────────────────────────────────────────────────────────────── */
.gantt-wrapper {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}
.gantt-container {
  flex: 1; display: flex; overflow: hidden;
}
.gantt-labels {
  background: var(--surface);
  border-right: 1px solid var(--border);
  flex-shrink: 0; display: flex; flex-direction: column;
  z-index: 10; box-shadow: 2px 0 6px rgba(0,0,0,.04);
}
.gantt-label-header {
  height: 56px; display: flex; align-items: center;
  padding: 0 12px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  font-family: 'Space Mono', monospace; letter-spacing: 0.5px;
  flex-shrink: 0;
}
.gantt-label-rows { overflow-y: hidden; }
.gantt-label-row {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.gantt-label-row:hover { background: #f8fafc; }
.gantt-label-row.selected { background: #e0f2fe; }
.gantt-label-row.critical .label-name { color: var(--critical); }
.task-type-icon { font-size: 9px; color: var(--text-muted); flex-shrink: 0; }
.task-type-icon.milestone { color: #1e293b; font-size: 10px; }
.label-name {
  flex: 1; min-width: 0;
  font-size: 12px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.label-assignee {
  font-size: 10px; color: var(--text-muted);
  white-space: nowrap; font-family: 'Space Mono', monospace;
}
.gantt-scroll {
  flex: 1; overflow: auto; position: relative;
}

/* ── Task detail panel ─────────────────────────────────────────────────────── */
.task-detail-panel {
  position: absolute; right: 16px; top: 16px;
  width: 280px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-lg); z-index: 50;
}
.task-detail-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
}
.task-detail-title { flex: 1; font-size: 12px; font-weight: 600; color: var(--text); }
.critical-badge {
  font-size: 9px; font-family: 'Space Mono', monospace;
  background: #fef2f2; color: var(--critical);
  padding: 2px 6px; border-radius: 3px; font-weight: 700;
  letter-spacing: 0.5px;
}
.task-detail-body {
  padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
}
.task-detail-actions {
  display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px;
}
.progress-row { display: flex; align-items: center; gap: 8px; }
.progress-row input[type=range] { flex: 1; }

/* ── Resources ─────────────────────────────────────────────────────────────── */
.resource-panel {
  flex: 1; display: flex; flex-direction: column;
  overflow-y: auto; padding: 16px; gap: 12px;
}
.panel-header {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.panel-title {
  font-size: 15px; font-weight: 600; color: var(--text);
}
.panel-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.panel-subtitle {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  font-family: 'Space Mono', monospace; letter-spacing: 0.5px;
  margin-bottom: 8px; text-transform: uppercase;
}
.resource-groups { display: flex; flex-direction: column; gap: 16px; }
.resource-group { display: flex; flex-direction: column; gap: 8px; }
.resource-group-title {
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  font-family: 'Space Mono', monospace;
  border-bottom: 1px solid var(--border); padding-bottom: 4px;
}
.resource-item { display: flex; align-items: center; gap: 4px; }
.resource-bar-row {
  flex: 1; display: flex; flex-direction: column; gap: 4px;
}
.resource-bar-label {
  display: flex; align-items: center; gap: 8px;
}
.resource-icon { font-size: 14px; }
.resource-info { flex: 1; display: flex; flex-direction: column; }
.resource-name { font-size: 12px; font-weight: 500; }
.resource-type-tag {
  font-size: 10px; font-family: 'Space Mono', monospace;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.resource-stats { display: flex; gap: 8px; align-items: center; }
.budget-val {
  font-size: 11px; font-family: 'Space Mono', monospace;
  color: #22c55e; font-weight: 700;
}
.load-pct {
  font-size: 11px; font-family: 'Space Mono', monospace;
  color: var(--text-muted); font-weight: 700; min-width: 34px; text-align: right;
}
.load-pct.overloaded { color: var(--critical); }
.resource-track {
  height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.resource-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.resource-heatmap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
}

/* ── Dashboard ─────────────────────────────────────────────────────────────── */
.dashboard-view {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
}
.dash-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
}
.stat-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px; display: flex; flex-direction: column; gap: 4px;
  box-shadow: var(--shadow);
}
.stat-icon { font-size: 20px; }
.stat-value {
  font-size: 28px; font-weight: 700;
  font-family: 'Space Mono', monospace; color: var(--text);
}
.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.dash-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
}
.dash-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  display: flex; flex-direction: column; gap: 8px;
  box-shadow: var(--shadow);
}
.dash-card-title {
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  font-family: 'Space Mono', monospace; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.empty-state { font-size: 12px; color: var(--text-muted); padding: 8px 0; }
.milestone-row {
  display: flex; align-items: center; gap: 8px; padding: 4px 0;
  border-bottom: 1px solid var(--border);
}
.milestone-diamond { font-size: 14px; }
.milestone-info { flex: 1; display: flex; flex-direction: column; }
.milestone-name { font-size: 12px; font-weight: 500; }
.milestone-mission { font-size: 10px; color: var(--text-muted); }
.milestone-date {
  font-size: 10px; font-family: 'Space Mono', monospace;
  color: var(--text-muted); white-space: nowrap;
}
.mission-progress-row {
  display: flex; align-items: center; gap: 8px; padding: 4px 0;
}
.mission-progress-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.mission-prog-name { font-size: 12px; font-weight: 500; }
.mini-progress-track {
  height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
}
.mini-progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }
.mission-prog-pct {
  font-size: 11px; font-family: 'Space Mono', monospace;
  color: var(--text-muted); min-width: 30px; text-align: right;
}
.cal-event-row {
  display: flex; align-items: center; gap: 8px; padding: 4px 0;
  border-bottom: 1px solid var(--border);
}
.cal-event-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #f59e0b; flex-shrink: 0;
}
.cal-event-info { flex: 1; display: flex; flex-direction: column; }
.cal-event-name { font-size: 12px; font-weight: 500; }
.cal-event-date {
  font-size: 10px; color: var(--text-muted);
  font-family: 'Space Mono', monospace;
}

/* ── Calendar ──────────────────────────────────────────────────────────────── */
.calendar-view {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.cal-header {
  display: flex; align-items: center; gap: 10px;
}
.cal-month-title {
  font-size: 16px; font-weight: 600; color: var(--text);
  font-family: 'Space Mono', monospace; min-width: 200px;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden;
}
.cal-dow {
  background: var(--surface-2); padding: 8px;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-align: center; font-family: 'Space Mono', monospace;
}
.cal-cell {
  background: var(--surface); padding: 6px;
  min-height: 80px; display: flex; flex-direction: column; gap: 2px;
}
.cal-cell.empty { background: var(--surface-2); }
.cal-cell.today { background: #e0f2fe; }
.cal-day-num {
  font-size: 12px; font-weight: 600; color: var(--text);
  font-family: 'Space Mono', monospace;
}
.cal-cell.today .cal-day-num {
  background: var(--accent); color: white;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.cal-event-chip {
  font-size: 9px; padding: 2px 5px; border-radius: 3px;
  color: white; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; opacity: 0.9;
}
.cal-more { font-size: 9px; color: var(--text-muted); }

/* ── Modals ────────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(2px);
}
.modal {
  background: var(--surface); border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  width: 440px; max-width: 95vw; max-height: 90vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal.wide { width: 520px; }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px; border-bottom: 1px solid var(--border);
  font-size: 14px; font-weight: 600;
}
.modal-body {
  padding: 16px 18px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.modal-footer {
  padding: 12px 18px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}
label {
  display: flex; flex-direction: column; gap: 4px;
  font-size: 12px; font-weight: 500; color: var(--text);
}
input, select, textarea {
  padding: 7px 10px; border-radius: 6px;
  border: 1px solid var(--border);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  color: var(--text); background: var(--surface);
  outline: none; transition: border .15s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(14,165,233,.1);
}
input[type=color] { height: 36px; padding: 2px 4px; cursor: pointer; }
input[type=range] { padding: 0; }
.form-row { display: flex; gap: 12px; }
.form-row label { flex: 1; }
.settings-note {
  background: #f8fafc; border-radius: 6px; padding: 10px;
  font-size: 12px; color: var(--text-muted); line-height: 1.6;
}
.settings-note a { color: var(--accent); }
.settings-note code {
  background: #e2e8f0; border-radius: 3px;
  padding: 1px 4px; font-family: 'Space Mono', monospace; font-size: 11px;
}

/* ── Auth screen ───────────────────────────────────────────────────────────── */
.auth-screen {
  height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
}
.auth-card {
  background: var(--surface); border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,.12);
  padding: 40px; width: 440px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.auth-logo {
  width: 56px; height: 56px; border-radius: 14px;
  background: linear-gradient(135deg, #0ea5e9, #6366f1);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin-bottom: 4px;
}
.auth-title {
  font-size: 22px; font-weight: 700; color: var(--text);
  font-family: 'Space Mono', monospace;
}
.auth-divider { width: 100%; border: none; border-top: 1px solid var(--border); }
.auth-note {
  font-size: 11px; color: var(--text-muted); max-width: 280px;
}


/* ── Toasts ────────────────────────────────────────────────────────────────── */
.toast-stack {
  position: fixed; bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 8px; z-index: 300;
}
.toast {
  background: #1e293b; color: white;
  padding: 10px 16px; border-radius: 8px;
  font-size: 12px; box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 8px;
  animation: slideIn .2s ease;
}
.toast.success { background: #14532d; }
.toast.error { background: #7f1d1d; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.empty-panel {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text-muted); font-size: 13px;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="missions.jsx"></script>
<script type="text/babel" src="gantt.jsx"></script>
<script type="text/babel" src="resources.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
// ── Toast system ─────────────────────────────────────────────────────────────
function useToasts() {
  const [toasts, setToasts] = React.useState([]);
  const add = (msg, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  };
  return { toasts, toast: add };
}

function ToastStack({ toasts }) {
  return (
    <div className="toast-stack">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          {t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : 'ℹ'} {t.msg}
        </div>
      ))}
    </div>
  );
}

// ── Main Application ──────────────────────────────────────────────────────────
function App() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentColor": "#169fdf",
    "showCriticalPath": true,
    "showAllMissions": false,
    "compactRows": false,
    "darkHeader": false
  }/*EDITMODE-END*/;

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [view, setView] = React.useState('gantt');
  const [isSignedIn, setIsSignedIn] = React.useState(false);
  const [isDemoMode] = React.useState(false);
  const [gapiReady, setGapiReady] = React.useState(false);
  const [gisReady, setGisReady] = React.useState(false);
  const [showSettings] = React.useState(false);
  const [showAddMission, setShowAddMission] = React.useState(false);
  const [showAddTask, setShowAddTask] = React.useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const [activeMissionId, setActiveMissionId] = React.useState(null);
  const [data, setData] = React.useState(null);
  const [syncStatus, setSyncStatus] = React.useState('offline'); // offline | syncing | synced
  const [calendarEvents, setCalendarEvents] = React.useState([]);
  const [calSyncing, setCalSyncing] = React.useState(false);
  const { toasts, toast } = useToasts();

  // Load config from localStorage
  // Hardcoded credentials — do not expose settings UI to users
  const CLIENT_ID = '732243213522-mchnbdj1r8ofnml8isaklrjqov94f3lu.apps.googleusercontent.com';
  const API_KEY = ''; // Set this once: your Google API Key
  const MASTER_FILE_ID = ''; // Set this once: your Drive file ID

  const [config] = React.useState(() => {
    // Allow masterFileId to be persisted in localStorage after first creation
    try {
      const s = localStorage.getItem('gantt_master_file_id');
      return { clientId: CLIENT_ID, apiKey: API_KEY, masterFileId: s || MASTER_FILE_ID || null };
    } catch { return { clientId: CLIENT_ID, apiKey: API_KEY, masterFileId: MASTER_FILE_ID || null }; }
  });

  // GAPI / GIS init
  React.useEffect(() => {
    const checkGapi = () => { if (window._gapiLoaded) setGapiReady(true); };
    const checkGis = () => { if (window._gisLoaded) setGisReady(true); };
    if (window._gapiLoaded) setGapiReady(true);
    if (window._gisLoaded) setGisReady(true);
    window.addEventListener('gapi-ready', checkGapi);
    window.addEventListener('gis-ready', checkGis);
    return () => {
      window.removeEventListener('gapi-ready', checkGapi);
      window.removeEventListener('gis-ready', checkGis);
    };
  }, []);

  // Init GAPI + GIS when both ready
  React.useEffect(() => {
    if (!gapiReady || !gisReady) return;
    if (!config.clientId) return;
    (async () => {
      try {
        // Init GAPI client (API key optional — needed for Calendar/Drive reads)
        await new Promise((resolve) => {
          window.gapi.load('client', async () => {
            try {
              await window.gapi.client.init({
                apiKey: config.apiKey || undefined,
                discoveryDocs: [
                  'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest',
                  'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest',
                ],
              });
            } catch(e) { console.warn('GAPI client init warning:', e); }
            resolve();
          });
        });

        // Init GIS token client
        window._tokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: config.clientId,
          scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events',
          callback: async (resp) => {
            if (resp.error) { toast('Auth error: ' + resp.error, 'error'); return; }
            setIsSignedIn(true);
            await loadDriveData();
            await loadCalendarEvents();
          },
        });
      } catch (e) {
        console.error('GAPI init error', e);
        toast('Google API init failed: ' + e.message, 'error');
      }
    })();
  }, [gapiReady, gisReady, config.clientId, config.apiKey]);

  // ── Drive data ──────────────────────────────────────────────────────────────
  async function loadDriveData() {
    if (!config.masterFileId) {
      const seed = makeSeedData();
      setData(seed);
      setActiveMissionId(seed.missions[0]?.id || null);
      return;
    }
    setSyncStatus('syncing');
    try {
      const res = await window.gapi.client.drive.files.get({
        fileId: config.masterFileId, alt: 'media',
      });
      const parsed = typeof res.body === 'string' ? JSON.parse(res.body) : res.result;
      setData(parsed);
      setActiveMissionId(parsed.missions[0]?.id || null);
      setSyncStatus('synced');
      toast('Data loaded from Drive ✓', 'success');
    } catch (e) {
      if (e.status === 403 || e.status === 404) {
        toast('Access denied to Drive file', 'error');
        setSyncStatus('offline');
      } else {
        const seed = makeSeedData();
        setData(seed);
        setActiveMissionId(seed.missions[0]?.id || null);
        toast('Could not load Drive file, using local data', 'error');
        setSyncStatus('offline');
      }
    }
  }

  async function saveToDrive(newData) {
    if (!isSignedIn) {
      setData(newData);
      return;
    }
    setSyncStatus('syncing');
    const body = JSON.stringify({ ...newData, lastSaved: new Date().toISOString() });
    try {
      if (config.masterFileId) {
        const boundary = '-------314159265358979323846';
        const multipart = `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify({ mimeType: 'application/json' })}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
        await window.gapi.client.request({
          path: `/upload/drive/v3/files/${config.masterFileId}`,
          method: 'PATCH',
          params: { uploadType: 'multipart' },
          headers: { 'Content-Type': `multipart/related; boundary="${boundary}"` },
          body: multipart,
        });
      } else {
        const res = await window.gapi.client.drive.files.create({
          resource: { name: 'AeroMission_Data.json', mimeType: 'application/json' },
          fields: 'id',
        });
        const fileId = res.result.id;
        localStorage.setItem('gantt_master_file_id', fileId);
        await window.gapi.client.request({
          path: `/upload/drive/v3/files/${fileId}`,
          method: 'PATCH',
          params: { uploadType: 'multipart' },
          headers: { 'Content-Type': `multipart/related; boundary="-------314159265358979323846"` },
          body: `\r\n-------314159265358979323846\r\nContent-Type: application/json\r\n\r\n${JSON.stringify({ mimeType: 'application/json' })}\r\n-------314159265358979323846\r\nContent-Type: application/json\r\n\r\n${body}\r\n-------314159265358979323846--`,
        });
        toast(`Drive file created (ID: ${fileId})`, 'success');
      }
      setData({ ...newData, lastSaved: new Date().toISOString() });
      setSyncStatus('synced');
    } catch (e) {
      console.error('Save error', e);
      toast('Save failed', 'error');
      setSyncStatus('offline');
      setData(newData);
    }
  }

  // ── Calendar ────────────────────────────────────────────────────────────────
  async function loadCalendarEvents() {
    try {
      const timeMin = new Date().toISOString();
      const timeMax = new Date(Date.now() + 90 * 86400000).toISOString();
      const res = await window.gapi.client.calendar.events.list({
        calendarId: 'primary', timeMin, timeMax,
        maxResults: 250, singleEvents: true, orderBy: 'startTime',
      });
      setCalendarEvents(res.result.items || []);
      toast('Calendar synced ✓', 'success');
    } catch (e) {
      console.error('Calendar error', e);
    }
  }

  async function syncMilestonesToCalendar() {
    if (!isSignedIn) { toast('Sign in with Google to sync calendar', 'error'); return; }
    setCalSyncing(true);
    const mission = activeMission;
    if (!mission) { setCalSyncing(false); return; }
    const milestones = mission.tasks.filter(t => t.type === 'milestone');
    let count = 0;
    for (const ms of milestones) {
      try {
        await window.gapi.client.calendar.events.insert({
          calendarId: 'primary',
          resource: {
            summary: `[${mission.name}] ${ms.name}`,
            description: `Milestone from AeroMission: ${mission.name}`,
            start: { date: ms.start },
            end: { date: ms.start },
          },
        });
        count++;
      } catch (e) {}
    }
    toast(`${count} milestones synced to Calendar ✓`, 'success');
    setCalSyncing(false);
    await loadCalendarEvents();
  }

  // ── Auth handlers ───────────────────────────────────────────────────────────
  function handleSignIn() {
    if (!config.clientId) {
      setShowSettings(true);
      toast('Please configure your API credentials first', 'error');
      return;
    }
    // If GIS not loaded yet, wait for it
    if (!window._gisLoaded) {
      toast('Google services still loading, please wait…', 'info');
      return;
    }
    // Create token client on demand if not yet created
    if (!window._tokenClient) {
      try {
        window._tokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: config.clientId,
          scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events',
          callback: async (resp) => {
            if (resp.error) { toast('Auth error: ' + resp.error, 'error'); return; }
            setIsSignedIn(true);
            await loadDriveData();
            await loadCalendarEvents();
          },
        });
      } catch (e) {
        toast('Google sign-in init failed: ' + e.message, 'error');
        return;
      }
    }
    try {
      window._tokenClient.requestAccessToken({ prompt: '' });
    } catch (e) {
      // If prompt:'' fails (no prior consent), try with prompt:'consent'
      try {
        window._tokenClient.requestAccessToken({ prompt: 'consent' });
      } catch (e2) {
        toast('Sign-in failed: ' + e2.message, 'error');
      }
    }
  }

  function handleSignOut() {
    const token = window.gapi?.client?.getToken();
    if (token) {
      window.google.accounts.oauth2.revoke(token.access_token);
      window.gapi.client.setToken('');
    }
    setIsSignedIn(false);
    setData(null);
    setCalendarEvents([]);
    setSyncStatus('offline');
    setIsDemoMode(false);
  }



  const activeMission = data?.missions?.find(m => m.id === activeMissionId) || null;

  // ── Data mutations ──────────────────────────────────────────────────────────
  function updateTask(taskId, updates) {
    if (!data || !activeMissionId) return;
    const newData = {
      ...data,
      missions: data.missions.map(m => ({
        ...m,
        tasks: m.tasks.map(t => t.id === taskId ? { ...t, ...updates } : t),
      })),
    };
    saveToDrive(newData);
  }

  function addTask(taskForm) {
    if (!data || !activeMissionId) return;
    const newTask = {
      id: 't' + Date.now(), ...taskForm,
      critical: false, calendarEventId: null,
    };
    const newData = {
      ...data,
      missions: data.missions.map(m =>
        m.id === activeMissionId ? { ...m, tasks: [...m.tasks, newTask] } : m
      ),
    };
    saveToDrive(newData);
    setShowAddTask(false);
    toast('Task added', 'success');
  }

  function addMission(form) {
    if (!data) return;
    const newM = {
      id: 'm' + Date.now(), ...form, tasks: [], resources: [],
    };
    const newData = { ...data, missions: [...data.missions, newM] };
    saveToDrive(newData);
    setActiveMissionId(newM.id);
    setShowAddMission(false);
    toast('Mission created', 'success');
  }

  function deleteMission(missionId) {
    if (!data) return;
    const newData = { ...data, missions: data.missions.filter(m => m.id !== missionId) };
    saveToDrive(newData);
    if (activeMissionId === missionId) setActiveMissionId(newData.missions[0]?.id || null);
    toast('Mission deleted', 'info');
  }

  function addResource(form) {
    if (!data || !activeMissionId) return;
    const newRes = { id: 'r' + Date.now(), ...form };
    const newData = {
      ...data,
      missions: data.missions.map(m =>
        m.id === activeMissionId ? { ...m, resources: [...m.resources, newRes] } : m
      ),
    };
    saveToDrive(newData);
  }

  function deleteResource(resId) {
    if (!data || !activeMissionId) return;
    const newData = {
      ...data,
      missions: data.missions.map(m =>
        m.id === activeMissionId ? { ...m, resources: m.resources.filter(r => r.id !== resId) } : m
      ),
    };
    saveToDrive(newData);
  }

  // Apply accent color from tweaks
  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    document.documentElement.style.setProperty('--accent-dark', tweaks.accentColor + 'dd');
  }, [tweaks.accentColor]);

  // ── Auth screen ─────────────────────────────────────────────────────────────
  if (!isSignedIn) {
    return (
      <div className="auth-screen">

        <div className="auth-card">
          <div className="auth-logo">✈</div>
          <div>
            <div className="auth-title">AeroMission</div>
            <div style={{ fontSize: 11, color: '#94a3b8', fontFamily: "'Space Mono', monospace", letterSpacing: 2, marginTop: 2 }}>
              NAVERIA INTERNAL TOOL
            </div>
          </div>
          <hr className="auth-divider" />
          <button className="btn-google" onClick={handleSignIn} disabled={!gisReady}>
            {!gisReady ? (
              <>
                <span style={{fontSize:14}}>⟳</span> Loading Google services…
              </>
            ) : (
              <>
                <svg width="18" height="18" viewBox="0 0 48 48">
                  <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                  <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                  <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                  <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Sign in with Google
              </>
            )}
          </button>

          <div className="auth-note">
            Access restricted to authorised Naveria accounts.
          </div>
        </div>
        <ToastStack toasts={toasts} />
      </div>
    );
  }

  if (!data) {
    return (
      <div className="auth-screen">
        <div style={{ textAlign: 'center', color: '#64748b', fontFamily: "'Space Mono', monospace" }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>⟳</div>
          Loading mission data…
        </div>
      </div>
    );
  }

  const navItems = [
    { id: 'dashboard', label: 'Dashboard', icon: '⊞' },
    { id: 'gantt', label: 'Gantt', icon: '≡' },
    { id: 'resources', label: 'Resources', icon: '◉' },
    { id: 'calendar', label: 'Calendar', icon: '▦' },
  ];

  return (
    <div className="app-shell">
      {/* Modals */}

      {showAddMission && (
        <NewMissionModal onSave={addMission} onClose={() => setShowAddMission(false)} />
      )}
      {showAddTask && (
        <AddTaskModal mission={activeMission} onSave={addTask} onClose={() => setShowAddTask(false)} />
      )}

      {/* Top bar */}
      <header className="app-topbar">
        <div className="app-logo">
          <div className="app-logo-mark">✈</div>
          <div>
            AeroMission
            <span className="app-logo-sub">Mission Control</span>
          </div>
        </div>
        <nav className="topbar-nav">
          {navItems.map(n => (
            <button key={n.id} className={`nav-btn ${view === n.id ? 'active' : ''}`} onClick={() => setView(n.id)}>
              <span>{n.icon}</span> {n.label}
            </button>
          ))}
        </nav>
        <div className="topbar-right">
          <div className="sync-status">
            <span className={`sync-dot ${syncStatus}`}></span>
            {syncStatus === 'synced' ? 'Synced' : syncStatus === 'syncing' ? 'Syncing…' : 'Offline'}
          </div>
          <button className="btn-primary small" onClick={() => saveToDrive(data)}>↑ Save</button>

          <button className="btn-secondary" style={{ fontSize: 11, padding: '4px 10px' }} onClick={handleSignOut}>
            Sign Out
          </button>
        </div>
      </header>

      {/* Body */}
      <div className="app-body">
        <MissionSidebar
          missions={data.missions}
          activeMissionId={activeMissionId}
          onSelect={setActiveMissionId}
          onAdd={() => setShowAddMission(true)}
          onDelete={deleteMission}
          collapsed={sidebarCollapsed}
          onToggle={() => setSidebarCollapsed(v => !v)}
        />

        <div className="content-area">
          {/* Content toolbar */}
          <div className="content-toolbar">
            {activeMission && (
              <div className="mission-title-bar">
                <span className="mission-title-badge" style={{ background: activeMission.color }}></span>
                <span className="content-title">{activeMission.name}</span>
                <span className="content-subtitle">
                  {activeMission.startDate} → {activeMission.endDate}
                </span>
                <span className="mission-status" style={{ color: STATUS_COLORS[activeMission.status], fontSize: 11, fontWeight: 600, marginLeft: 4 }}>
                  {activeMission.status}
                </span>
              </div>
            )}
            <div className="toolbar-right">
              {view === 'gantt' && (
                <>
                  <label className="toggle-wrap">
                    <span>All Missions</span>
                    <label className="toggle">
                      <input type="checkbox" checked={tweaks.showAllMissions}
                        onChange={e => setTweak('showAllMissions', e.target.checked)} />
                      <span className="toggle-slider"></span>
                    </label>
                  </label>
                  <label className="toggle-wrap">
                    <span>Critical Path</span>
                    <label className="toggle">
                      <input type="checkbox" checked={tweaks.showCriticalPath}
                        onChange={e => setTweak('showCriticalPath', e.target.checked)} />
                      <span className="toggle-slider"></span>
                    </label>
                  </label>
                  {activeMission && (
                    <button className="btn-primary small" onClick={() => setShowAddTask(true)}>+ Task</button>
                  )}
                </>
              )}
              {data.lastSaved && (
                <span style={{ fontSize: 10, color: '#94a3b8', fontFamily: "'Space Mono', monospace" }}>
                  Saved {new Date(data.lastSaved).toLocaleTimeString()}
                </span>
              )}
            </div>
          </div>

          {/* View content */}
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>
            {view === 'dashboard' && (
              <DashboardView missions={data.missions} calendarEvents={calendarEvents} />
            )}
            {view === 'gantt' && (
              <GanttChart
                mission={tweaks.showAllMissions ? null : activeMission}
                allMissions={data.missions}
                showAllMissions={tweaks.showAllMissions}
                calendarEvents={calendarEvents}
                onTaskUpdate={updateTask}
                tweaks={tweaks}
              />
            )}
            {view === 'resources' && (
              <ResourcePanel
                mission={activeMission}
                onAddResource={addResource}
                onDeleteResource={deleteResource}
              />
            )}
            {view === 'calendar' && (
              <CalendarView
                missions={data.missions}
                calendarEvents={calendarEvents}
                onSyncToCalendar={syncMilestonesToCalendar}
                syncing={calSyncing}
              />
            )}
          </div>
        </div>
      </div>

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection label="Visual">
          <TweakColor label="Accent color" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
          <TweakToggle label="Compact rows" value={tweaks.compactRows} onChange={v => setTweak('compactRows', v)} />
        </TweakSection>
        <TweakSection label="Gantt">
          <TweakToggle label="Show critical path" value={tweaks.showCriticalPath} onChange={v => setTweak('showCriticalPath', v)} />
          <TweakToggle label="Show all missions" value={tweaks.showAllMissions} onChange={v => setTweak('showAllMissions', v)} />
        </TweakSection>
      </TweaksPanel>

      <ToastStack toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
